<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reel — локальный плеер</title>
<meta name="theme-color" content="#14171C">
<meta name="description" content="Локальный музыкальный плеер с фоновым воспроизведением">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">◎</span>
      <span class="brand-name">Reel</span>
    </div>
    <button class="btn-add" id="addFolderBtn" type="button">
      <span class="btn-add-icon" aria-hidden="true">+</span>
      <span>Добавить музыку</span>
    </button>
  </header>

  <main class="player" id="player">

    <section class="deck" aria-label="Проигрыватель">
      <svg class="reels" id="reels" viewBox="0 0 320 120" aria-hidden="true">
        <line x1="80" y1="60" x2="240" y2="60" class="reel-belt"/>
        <g class="reel" id="reelLeft">
          <circle cx="80" cy="60" r="46" class="reel-rim"/>
          <circle cx="80" cy="60" r="14" class="reel-hub"/>
          <line x1="80" y1="20" x2="80" y2="100" class="reel-spoke"/>
          <line x1="40" y1="60" x2="120" y2="60" class="reel-spoke"/>
        </g>
        <g class="reel" id="reelRight">
          <circle cx="240" cy="60" r="46" class="reel-rim"/>
          <circle cx="240" cy="60" r="14" class="reel-hub"/>
          <line x1="240" y1="20" x2="240" y2="100" class="reel-spoke"/>
          <line x1="200" y1="60" x2="280" y2="60" class="reel-spoke"/>
        </g>
      </svg>

      <div class="track-info">
        <p class="track-title" id="trackTitle">Ничего не выбрано</p>
        <p class="track-artist" id="trackArtist">Добавь папку с музыкой, чтобы начать</p>
      </div>

      <div class="counter-row">
        <span class="counter" id="timeCurrent">00:00</span>
        <input type="range" class="scrub" id="scrub" min="0" max="1000" value="0" step="1" disabled aria-label="Перемотка">
        <span class="counter" id="timeTotal">00:00</span>
      </div>

      <div class="transport">
        <button class="btn-transport btn-toggle" id="shuffleBtn" type="button" aria-pressed="false" title="Перемешать">
          <svg viewBox="0 0 24 24"><path d="M4 6h3.5l7 12H18M4 18h3.5l1.6-2.7M14.4 8.7L16 6h2M18 4v4h-4M18 20v-4h-4" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn-transport" id="prevBtn" type="button" title="Предыдущий" disabled>
          <svg viewBox="0 0 24 24"><path d="M6 5v14M18 5v14l-11-7z" fill="currentColor"/></svg>
        </button>
        <button class="btn-transport btn-play" id="playBtn" type="button" title="Играть" disabled>
          <svg viewBox="0 0 24 24" id="playIcon"><path d="M7 5v14l12-7z" fill="currentColor"/></svg>
        </button>
        <button class="btn-transport" id="nextBtn" type="button" title="Следующий" disabled>
          <svg viewBox="0 0 24 24"><path d="M18 5v14M6 5v14l11-7z" fill="currentColor"/></svg>
        </button>
        <button class="btn-transport btn-toggle" id="repeatBtn" type="button" aria-pressed="false" title="Повтор">
          <svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="repeat-one-dot" id="repeatOneDot" hidden>1</span>
        </button>
      </div>
    </section>

    <section class="library" aria-label="Библиотека">
      <div class="library-head">
        <h2>Библиотека</h2>
        <span class="library-count" id="libraryCount"></span>
      </div>
      <ul class="tracklist" id="tracklist"></ul>
      <div class="empty-state" id="emptyState">
        <p>Здесь появится список треков.</p>
        <p class="empty-sub">Нажми «Добавить музыку» и выбери папку на устройстве. Файлы не загружаются никуда — они остаются на телефоне.</p>
      </div>
    </section>

  </main>

  <p class="platform-note" id="platformNote"></p>
</div>

<audio id="audio" preload="metadata"></audio>
<input type="file" id="folderInputFS" webkitdirectory multiple hidden>
<input type="file" id="folderInputFallback" accept="audio/*" multiple hidden>

<script src="app.js"></script>
</body>
</html>
